# Triggers on PR when Go API code changes
# Tests across multiple Go versions (matrix strategy)
name: go - build - pull request

on:
  pull_request:
    branches:
      - main
    paths:
      - 'src/server/api/go/reminders-api/**'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Check out the repo
      uses: actions/checkout@v4

    - name: Setup Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.20'

    - name: Install dependencies
      working-directory: src/server/api/go/reminders-api
      run: |
        go env
        go mod download

    - name: Build
      working-directory: src/server/api/go/reminders-api
      run: go build -v ./cmd/app/

    - name: Test with the Go CLI
      working-directory: src/server/api/go/reminders-api
      run: go test ./...
