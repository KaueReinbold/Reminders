# Triggers on PR when infrastructure files change
# Validates Docker Compose and workflow configurations
name: pull request - check

permissions:
  contents: read

on:
  pull_request:
    branches:
      - main
    paths:
      - 'docker-compose*.yml'
      - '.github/workflows/**'
      - 'infrastructure/**'
      - 'Dockerfile*'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Check status
      run: echo "Check success!"