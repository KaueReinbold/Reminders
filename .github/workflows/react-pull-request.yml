# Triggers on PR when React app code changes
# Runs Jest tests with coverage and validates build
name: Build and Test React App

on:
  pull_request:
    branches:
      - main
    paths:
      - 'src/app/reactjs/reminders-app/**'

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: src/app/reactjs/reminders-app/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: src/app/reactjs/reminders-app

      - name: Run Jest unit tests
        run: npm test -- --watchAll=false --coverage
        working-directory: src/app/reactjs/reminders-app

      - name: Build React app
        run: npm run build
        working-directory: src/app/reactjs/reminders-app

      - name: Upload test coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-coverage
          path: src/app/reactjs/reminders-app/coverage
          retention-days: 7
